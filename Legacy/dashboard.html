<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPlay - 대시보드</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ott.css">
</head>
<body class="ott-body">

    <!-- Header Navigation -->
    <header class="ott-header">
        <div class="header-left">
            <h1 class="logo">
                <span class="logo-icon">▶</span>
                <span>MyPlay</span>
            </h1>
            <nav class="main-nav">
                <a href="#">TV</a>
                <a href="#">영화</a>
                <a href="#">스포츠</a>
                <a href="#">스토어</a>
                <a href="#">키즈</a>
                <a href="#">라이브</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="dropdown">
                <span>카테고리 ⌵</span>
            </div>
            <div class="search-icon">🔍</div>
            <div class="profile-icon" id="profile-icon">동</div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-slider">
        <div class="hero-slide active">
            <div class="hero-bg" style="background-image: url('hero_banner.png');"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <div class="badge">▶ 시리즈</div>
                <h2 class="hero-title">강호동네<br>서점</h2>
                <div class="hero-meta">
                    <span class="star">★</span> 4.5 ‧ 토크쇼 ‧ 40분
                </div>
                <button class="play-btn">재생하기</button>
            </div>
            <div class="hero-pagination">
                <button class="page-btn">❮</button>
                <span>1 / 12</span>
                <button class="page-btn">❯</button>
            </div>
        </div>
    </section>

    <!-- Categories / Thumbnails -->
    <section class="content-row">
        <h3 class="row-title">시청 중인 콘텐츠</h3>
        <div class="thumbnails">
            <div class="thumb card-1">
                <div class="progress"><div class="progress-bar" style="width: 40%"></div></div>
            </div>
            <div class="thumb card-2"></div>
            <div class="thumb card-3"></div>
            <div class="thumb card-4"></div>
            <div class="thumb card-5"></div>
            <div class="thumb card-6"></div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataStr = localStorage.getItem('userData');
            if (dataStr) {
                const data = JSON.parse(dataStr);
                const profileNode = document.getElementById('profile-icon');
                if (profileNode && data.username) {
                    profileNode.innerText = data.username.charAt(0);
                    // Add click event for logout
                    profileNode.addEventListener('click', () => {
                        if(confirm('로그아웃 하시겠습니까?')) {
                            handleLogout();
                        }
                    });
                }
            } else {
                alert('비정상적인 접근입니다. 다시 로그인해주세요.');
                goToPage('login.html');
            }
        });
    </script>
</body>
</html>
