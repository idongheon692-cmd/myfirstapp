<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box signup-box">
            <h2>계정 만들기</h2>
            <p class="subtitle">환영합니다! 회원가입을 진행해주세요</p>
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label for="username">이름</label>
                    <input type="text" id="username" name="username" placeholder="이름을 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="confirm-password">비밀번호 확인</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="비밀번호를 다시 입력하세요" required>
                </div>
                <button type="submit" class="btn primary-btn">회원가입</button>
            </form>
            <p class="switch-auth">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
